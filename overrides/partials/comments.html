{% if page.meta.comments %}
<h2 id="__comments">Comments</h2>

<!-- Giscus comments — powered by GitHub Discussions -->
<!-- Setup: https://giscus.app — fill in data-repo-id and data-category-id -->
<script
  src="https://giscus.app/client.js"
  data-repo="digitalgrease/blog.digitalgrease.github.io"
  data-repo-id="REPLACE_WITH_REPO_ID"
  data-category="Announcements"
  data-category-id="REPLACE_WITH_CATEGORY_ID"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-theme="dark_dimmed"
  data-lang="en"
  crossorigin="anonymous"
  async>
</script>
{% endif %}
