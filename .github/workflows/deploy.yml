name: Build and publish deploy artifact

# Pull model: CI builds and publishes a tarball to a rolling 'deploy' release
# using the ephemeral GITHUB_TOKEN. The VPS pulls + verifies it (see
# vps-edge/pull/). No SSH key or long-lived secret is stored in GitHub.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # create/update the rolling 'deploy' release

concurrency:
  group: deploy-artifact
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install dependencies
        # pip 26.1+ supports --uploaded-prior-to with relative durations.
        # The 7-day cooldown defeats supply-chain attacks during their
        # narrow detection window. See ../../COOLDOWNS.md.
        run: |
          pip install --upgrade 'pip>=26.1'
          pip install --uploaded-prior-to "7 days ago" -r requirements.txt

      - name: Build site
        run: properdocs build

      - name: Strip image metadata
        run: |
          sudo apt-get install -y --no-install-recommends libimage-exiftool-perl
          exiftool -all= -overwrite_original -r site/

      - name: Optimize images
        run: python scripts/optimize-images.py site

      - name: Package artifact
        run: |
          tar -czf "$RUNNER_TEMP/site.tar.gz" -C site .
          sha256sum "$RUNNER_TEMP/site.tar.gz" | awk '{print $1}' > "$RUNNER_TEMP/site.tar.gz.sha256"

      # Publish only on push to main; pull_request runs build as a CI check.
      - name: Publish to rolling 'deploy' release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view deploy >/dev/null 2>&1 || \
            gh release create deploy --title "Deploy artifact" \
              --notes "Rolling build artifact pulled by the VPS." --latest=false
          gh release upload deploy \
            "$RUNNER_TEMP/site.tar.gz" "$RUNNER_TEMP/site.tar.gz.sha256" --clobber
